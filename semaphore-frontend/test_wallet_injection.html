<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/starknet@6.23.1/dist/index.global.js"></script>
</head>
<body>
    <button id="connectWalletLanding">Connect</button>
    <div id="out"></div>
<script>
    document.getElementById('connectWalletLanding').addEventListener('click', async () => {
        const str = [];
        
        // Mock get-starknet-core injection behavior
        if(window.starknet) {
            str.push("window.starknet found.");
            str.push(`Keys: ${Object.keys(window.starknet).join(', ')}`);
            if(window.starknet.account) str.push(`window.starknet.account Keys: ${Object.keys(window.starknet.account).join(', ')}`);
            if(window.starknet.provider) str.push(`window.starknet.provider Keys: ${Object.keys(window.starknet.provider).join(', ')}`);
        } else {
            str.push("window.starknet missing.");
        }
        
        document.getElementById('out').innerText = str.join('\n');
    });
</script>
</body>
</html>
