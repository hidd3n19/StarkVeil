<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deploy Semaphore on Testnet</title>
    <!-- Use Starknet.js -->
    <script src="https://cdn.jsdelivr.net/npm/starknet@6.23.1/dist/index.global.js"></script>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px 0;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }

        button:disabled {
            background: #ccc;
        }

        pre {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }

        .success {
            color: green;
            font-weight: bold;
        }

        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>🚀 Deploy Semaphore</h1>
    <p>Using your literal browser wallet to bypass CLI signature issues.</p>

    <button id="connectBtn">1. Connect Wallet</button>
    <pre id="walletStatus">Not connected</pre>

    <button id="deployVerifierBtn" disabled>2. Deploy Verifier Contract</button>
    <pre id="verifierStatus">Waiting...</pre>

    <button id="deploySemaphoreBtn" disabled>3. Deploy Semaphore Contract</button>
    <pre id="semaphoreStatus">Waiting...</pre>

    <script>
        let wallet = null;
        let verifierAddress = null;

        const out = (id, msg, isErr = false) => {
            const el = document.getElementById(id);
            el.innerText = msg;
            if (isErr) el.className = "error";
            else if (msg.includes("Success") || msg.includes("0x")) el.className = "success";
            else el.className = "";
        };

        // WARNING: Replace these paths with the literal contents of your compiled files if fetching fails!
        async function fetchCompiled(path) {
            const res = await fetch(path);
            if (!res.ok) throw new Error(`Failed to load ${path}`);
            return await res.json();
        }

        document.getElementById('connectBtn').onclick = async () => {
            out('walletStatus', 'Connect extension...');
            try {
                if (!window.starknet_argentX) { throw new Error("ArgentX extension not found!"); }

                wallet = window.starknet_argentX;
                await wallet.enable({ starknetVersion: "v5" });

                if (!wallet.isConnected) throw new Error("User rejected connection");

                out('walletStatus', `Connected: ${wallet.account.address}`);
                document.getElementById('deployVerifierBtn').disabled = false;
            } catch (e) { out('walletStatus', e.message, true); }
        };

        document.getElementById('deployVerifierBtn').onclick = async () => {
            out('verifierStatus', 'Fetching compiled Verifier...');
            document.getElementById('deployVerifierBtn').disabled = true;
            try {
                // Fetch the compiled artifacts generated by `scarb build`
                const sierra = await fetchCompiled('/target/dev/semaphore_starknet_Groth16Backend.contract_class.json');
                const casm = await fetchCompiled('/target/dev/semaphore_starknet_Groth16Backend.compiled_contract_class.json');

                out('verifierStatus', 'Declaring & Deploying Verifier... Approve in wallet!');

                const deployResponse = await wallet.account.declareAndDeploy({
                    contract: sierra,
                    casm: casm,
                    deployerAddress: wallet.account.address
                }, { maxFee: 10000000000000000 });

                out('verifierStatus', `Waiting for Tx: ${deployResponse.deploy.transaction_hash}`);

                const receipt = await wallet.provider.waitForTransaction(deployResponse.deploy.transaction_hash);

                if (receipt.execution_status === "SUCCEEDED") {
                    verifierAddress = deployResponse.deploy.contract_address;
                    out('verifierStatus', `Success! Verifier Address:\n${verifierAddress}`);
                    document.getElementById('deploySemaphoreBtn').disabled = false;
                } else {
                    throw new Error("Transaction reverted.");
                }

            } catch (e) {
                out('verifierStatus', e.message, true);
                document.getElementById('deployVerifierBtn').disabled = false;
            }
        };

        document.getElementById('deploySemaphoreBtn').onclick = async () => {
            out('semaphoreStatus', 'Fetching compiled Semaphore...');
            document.getElementById('deploySemaphoreBtn').disabled = true;
            try {
                const sierra = await fetchCompiled('/target/dev/semaphore_starknet_Semaphore.contract_class.json');
                const casm = await fetchCompiled('/target/dev/semaphore_starknet_Semaphore.compiled_contract_class.json');

                out('semaphoreStatus', 'Declaring & Deploying Semaphore... Approve in wallet!');

                // Constructor expects exactly: groth16_verifier_address, owner
                const callData = [verifierAddress, wallet.account.address];

                const deployResponse = await wallet.account.declareAndDeploy({
                    contract: sierra,
                    casm: casm,
                    constructorCalldata: callData,
                    deployerAddress: wallet.account.address
                }, { maxFee: 10000000000000000 });

                out('semaphoreStatus', `Waiting for Tx: ${deployResponse.deploy.transaction_hash}`);

                const receipt = await wallet.provider.waitForTransaction(deployResponse.deploy.transaction_hash);

                if (receipt.execution_status === "SUCCEEDED") {
                    const finalAddress = deployResponse.deploy.contract_address;
                    out('semaphoreStatus', `🎉 FINAL SEMAPHORE CONTRACT:\n${finalAddress}\n\nPut this in main.js!`);
                } else {
                    throw new Error("Transaction reverted.");
                }

            } catch (e) {
                out('semaphoreStatus', e.message, true);
                document.getElementById('deploySemaphoreBtn').disabled = false;
            }
        };
    </script>
</body>

</html>
